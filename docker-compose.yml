services:
  jokhan-portfolio:
    container_name: site-jokhan_portfolio
    build:
      context: .
      args:
        # URL PUBLIQUE de PocketBase, utilisée au build pour récupérer les données.
        POCKETBASE_URL: ${POCKETBASE_URL}
        # Invalidation du cache pour refetch PocketBase : passe CACHEBUST=$(date +%s).
        CACHEBUST: ${CACHEBUST:-0}
    ports:
      - "8085:80"
    restart: unless-stopped
    networks:
      - pocketbase_jokhan_network

networks:
  pocketbase_jokhan_network:
    external: true
